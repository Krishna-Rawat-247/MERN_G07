<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        h3{
            color: rgb(114, 19, 210);
        }
        button{
            color: black ;
            width: 100px;
            padding: 20px;
            font-weight: bold;
            border: 10px black;
            background-color: red;
        }
    </style>
</head>
<body>
    <h1>DOM 1</h1>
    <h3>Welcome to my Webpage</h3>
    <button id = "sub">Exit</button>
</body>
</html>
<script> 
    console.log("Hello")
    var btn = document.querySelector("#sub")
    btn.addEventListener("click", evenButton)
    var flag = false
    function evenButton(){
        // alert("Button is Clicked")
        flag = !flag 
        if(flag){
            var h3 = document.querySelector("h3")
            h3.innerText = "Okay! Thanks for Visiting"
            var button = document.querySelector("button")
            button.innerText = "Welcome"
            h3.style.color = "blue"
        }else{
            var h3 = document.querySelector("h3")
            h3.innerText = "welcome to my WebPage"
            btn.innerHTML = "Yo"
            h3.style.color = "Green"
        }
    }
</script>
