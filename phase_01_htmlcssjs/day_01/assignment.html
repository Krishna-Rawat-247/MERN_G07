<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            border: 2px solid #e08d19;
            width: 90%;
            height: 10%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: rgb(41, 56, 194);
            border-radius: 5%;
        }
        #container  > div{
            border: 2px solid rgb(90, 15, 164);
            height: 150px;
            width: 30%;
            margin: auto;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 30px;
            padding-left: 30px;
            padding-right: 30px;
            background-color: aquamarine;
            background-color: rgb(176, 37, 241);


        }
    </style>
</head>
<body>
    <div id = "container">
        <div style="font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;">This is Div 1</div>
        <div style="font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;">This is Div 2 </div>
        <div style="font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;">This is Div 3</div>

    </div>
</body
</html>
